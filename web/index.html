<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>V2T</title>
<link rel="stylesheet" href="style.css" />
</head>
<body data-state="empty">

  <!-- ============ Top bar ============ -->
  <header class="topbar">
    <button class="btn primary add-file" id="addBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      添加文件
    </button>

    <div class="topbar-spacer"></div>

    <label class="topbar-field control-group">
      <span class="topbar-field-label">语言</span>
      <select id="language" aria-label="转写语言">
        <option value="auto">自动识别</option>
        <option value="zh">中文</option>
        <option value="en">英文</option>
        <option value="ja">日文</option>
        <option value="ko">韩文</option>
      </select>
    </label>

    <button class="btn topbar-outdir control-group" id="pickOut" aria-label="选择输出目录" title="">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span id="outDirShort">输出目录</span>
    </button>

    <div class="topbar-actions">
      <button class="btn ghost small" id="clearDoneBtn" hidden>清除已完成</button>
      <button class="btn ghost small danger" id="cancelAllBtn" hidden>停止全部</button>
    </div>
  </header>

  <!-- ============ Model banner (shown when model missing) ============ -->
  <div id="modelBanner" class="banner" hidden>
    <div class="banner-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </div>
    <div class="banner-body">
      <div class="banner-title" id="bannerTitle">Whisper 模型未安装</div>
      <div class="banner-sub" id="bannerSub">需要下载约 3GB 的语音识别模型才能开始转写。</div>
      <div class="banner-progress" id="bannerProgress" hidden>
        <div class="banner-bar"><div class="banner-fill" id="bannerFill"></div></div>
        <div class="banner-meta">
          <span id="bannerProgressText">0%</span>
          <span id="bannerProgressFile"></span>
        </div>
      </div>
    </div>
    <div class="banner-actions" id="bannerActions">
      <button class="btn small" id="bannerOpenDirBtn">打开目录</button>
      <button class="btn small primary" id="bannerDownloadBtn">立即下载</button>
    </div>
    <div class="banner-actions" id="bannerCancelActions" hidden>
      <button class="btn small ghost" id="bannerCancelBtn">取消</button>
    </div>
  </div>

  <!-- ============ Content ============ -->
  <main class="content">

    <!-- Empty state -->
    <section class="empty-state" data-show="empty">
      <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="拖入文件或点击添加">
        <div class="dz-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="dz-copy">
          <div class="dz-kicker">本地转写队列</div>
          <div class="dz-title">拖入音视频文件</div>
          <div class="dz-sub">也可以点击选择文件，支持多选</div>
        </div>
        <button class="btn primary dz-action" type="button" tabindex="-1">选择文件</button>
      </div>
    </section>

    <!-- Queue list -->
    <section class="queue" data-show="hasItems">
      <ul class="queue-list" id="queueList" role="list"></ul>
    </section>

  </main>

  <div class="toast" id="toast" hidden role="status" aria-live="polite"></div>

  <!-- ============ Status bar ============ -->
  <footer class="statusbar">
    <span class="stats" id="stats" aria-live="polite">队列为空</span>
    <span class="version" id="version"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
